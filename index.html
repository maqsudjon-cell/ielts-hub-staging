<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IELTS Practice Hub</title>
  <meta name="description" content="A curated hub of IELTS practice tests across Listening, Reading, Writing, and Speaking." />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body, h1, h2, h3, p, button, input { margin: 0; }

    :root {
      --bg: #fafbfc;
      --surface: #ffffff;
      --text: #11142b;
      --text-muted: #6b7280;
      --border: #ececf3;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --accent-soft: #eef2ff;
      --shadow-sm: 0 1px 2px rgba(17, 20, 43, 0.04), 0 1px 1px rgba(17, 20, 43, 0.03);
      --shadow-md: 0 12px 28px -10px rgba(99, 102, 241, 0.20), 0 4px 10px -4px rgba(17, 20, 43, 0.06);
      --radius-card: 14px;
      --radius-input: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Helvetica Neue", Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
    }

    .container {
      max-width: 1080px;
      margin: 0 auto;
      padding: 2rem 1.25rem 5rem;
    }

    header.page-header {
      text-align: center;
      padding: 2.5rem 0 2rem;
    }
    header.page-header h1 {
      font-size: clamp(1.875rem, 4.5vw, 2.625rem);
      font-weight: 700;
      letter-spacing: -0.025em;
      background: linear-gradient(135deg, #4f46e5 0%, #8b5cf6 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    header.page-header p {
      color: var(--text-muted);
      margin-top: 0.5rem;
      font-size: 1.05rem;
    }

    .search-bar {
      position: relative;
      margin-bottom: 1.25rem;
    }
    .search-bar input {
      width: 100%;
      padding: 0.9rem 1rem 0.9rem 2.875rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-input);
      background: var(--surface);
      font-size: 1rem;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      box-shadow: var(--shadow-sm);
    }
    .search-bar input::placeholder { color: #9ca3af; }
    .search-bar input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
    }
    .search-bar svg {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #9ca3af;
      pointer-events: none;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }
    .tab {
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      cursor: pointer;
      font-size: 0.9rem;
      font-family: inherit;
      color: var(--text-muted);
      transition: color 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    }
    .tab:hover { color: var(--accent); border-color: var(--accent); }
    .tab.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .category-section { margin-bottom: 2.5rem; }
    .category-section:last-child { margin-bottom: 0; }
    .category-header {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      margin-bottom: 1rem;
    }
    .category-header h2 {
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .badge {
      background: var(--accent-soft);
      color: var(--accent);
      padding: 0.15rem 0.625rem;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 600;
      line-height: 1.45;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }
    .card {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      padding: 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      text-decoration: none;
      color: inherit;
      box-shadow: var(--shadow-sm);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
      border-color: rgba(99, 102, 241, 0.35);
    }
    .card-category {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .card-title {
      font-size: 1.02rem;
      font-weight: 600;
      line-height: 1.35;
      color: var(--text);
    }
    .card-date {
      margin-top: auto;
      padding-top: 0.4rem;
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius-card);
    }
    .empty-icon { font-size: 2rem; margin-bottom: 0.5rem; opacity: 0.6; }
    .empty h3 { font-weight: 600; margin-bottom: 0.25rem; color: var(--text); font-size: 1.05rem; }
    .empty p { font-size: 0.95rem; }

    .loading {
      text-align: center;
      padding: 2.5rem;
      color: var(--text-muted);
    }

    @media (max-width: 600px) {
      .container { padding: 1rem 1rem 3rem; }
      header.page-header { padding: 1.75rem 0 1.5rem; }
      .cards { grid-template-columns: 1fr; }
      .tab { font-size: 0.85rem; padding: 0.45rem 0.85rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="page-header">
      <h1>IELTS Practice Hub</h1>
      <p>Curated mock tests for Listening, Reading, Writing, and Speaking.</p>
    </header>

    <div class="search-bar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" id="search" placeholder="Search tests by title..." autocomplete="off" aria-label="Search tests" />
    </div>

    <div class="tabs" id="tabs" role="tablist"></div>

    <main id="content" aria-live="polite">
      <div class="loading">Loading tests…</div>
    </main>
  </div>

  <script>
    const state = {
      tests: [],
      categories: [],
      activeCategory: 'All',
      searchQuery: ''
    };

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str == null ? '' : String(str);
      return div.innerHTML;
    }

    async function loadData() {
      try {
        const res = await fetch('tests.json', { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        state.categories = Array.isArray(data.categories) ? data.categories : [];
        state.tests = Array.isArray(data.tests) ? data.tests : [];
        renderTabs();
        render();
      } catch (err) {
        document.getElementById('content').innerHTML = `
          <div class="empty">
            <div class="empty-icon">⚠️</div>
            <h3>Could not load tests</h3>
            <p>Check that <code>tests.json</code> is reachable. (${escapeHtml(err.message)})</p>
          </div>`;
      }
    }

    function renderTabs() {
      const tabs = document.getElementById('tabs');
      const labels = ['All', ...state.categories];
      tabs.innerHTML = labels.map(cat => {
        const isActive = cat === state.activeCategory;
        return `<button class="tab${isActive ? ' active' : ''}" role="tab" aria-selected="${isActive}" data-cat="${escapeHtml(cat)}">${escapeHtml(cat)}</button>`;
      }).join('');
      tabs.querySelectorAll('.tab').forEach(btn => {
        btn.addEventListener('click', () => {
          state.activeCategory = btn.dataset.cat;
          renderTabs();
          render();
        });
      });
    }

    function render() {
      const content = document.getElementById('content');
      const q = state.searchQuery.toLowerCase().trim();

      const filtered = state.tests.filter(t => {
        const matchesCat = state.activeCategory === 'All' || t.category === state.activeCategory;
        const matchesSearch = !q || String(t.title || '').toLowerCase().includes(q);
        return matchesCat && matchesSearch;
      });

      if (filtered.length === 0) {
        content.innerHTML = `
          <div class="empty">
            <div class="empty-icon">🔍</div>
            <h3>No tests found</h3>
            <p>${q ? 'Try a different search term' : 'No tests in this category yet'}${state.activeCategory !== 'All' ? ' in <strong>' + escapeHtml(state.activeCategory) + '</strong>' : ''}.</p>
          </div>`;
        return;
      }

      const extras = [...new Set(filtered.map(t => t.category).filter(c => c && !state.categories.includes(c)))];
      const orderedCats = state.activeCategory === 'All'
        ? [...state.categories, ...extras]
        : [state.activeCategory];

      let html = '';
      for (const cat of orderedCats) {
        const items = filtered.filter(t => t.category === cat);
        if (items.length === 0) continue;
        html += `
          <section class="category-section">
            <div class="category-header">
              <h2>${escapeHtml(cat)}</h2>
              <span class="badge">${items.length}</span>
            </div>
            <div class="cards">
              ${items.map(t => `
                <a class="card" href="${escapeHtml(t.url || '#')}" target="_blank" rel="noopener noreferrer">
                  <span class="card-category">${escapeHtml(t.category || '')}</span>
                  <div class="card-title">${escapeHtml(t.title || 'Untitled')}</div>
                  ${t.date ? `<div class="card-date">${escapeHtml(t.date)}</div>` : ''}
                </a>
              `).join('')}
            </div>
          </section>`;
      }

      content.innerHTML = html;
    }

    document.getElementById('search').addEventListener('input', (e) => {
      state.searchQuery = e.target.value;
      render();
    });

    loadData();
  </script>
</body>
</html>
