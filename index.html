<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLARESTAMINA — IELTS Practice Hub</title>
<meta name="description" content="Free IELTS practice: 100+ listening and reading tests, Cambridge 21, full mocks, speaking and writing labs. One account, every tool.">
<meta name="theme-color" content="#000000">
<meta property="og:title" content="FLARESTAMINA — IELTS Practice Hub">
<meta property="og:description" content="100+ free IELTS tests with instant scoring. One account, every tool.">
<meta property="og:type" content="website">
<meta property="og:image" content="https://flarestamina.com/og-image.png">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">
<script>
// theme before paint — dark is the default identity
(function () {
  try {
    var t = localStorage.getItem('theme') || 'dark';
    document.documentElement.dataset.theme = t;
  } catch (e) { document.documentElement.dataset.theme = 'dark'; }
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@400;500;600&display=swap">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000; --surface:#0A0A0A; --card:#0D0D0D;
  --border:#232323; --border-strong:#3a3a3a;
  --text:#EDEDED; --muted:#8A8A8A; --faint:#555;
  --accent:#FF5A1F; --on-accent:#180702;
  --red:#D71921;
  --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  --sans:'Inter',system-ui,-apple-system,sans-serif;
}
html[data-theme="light"]{
  --bg:#FAFAF9; --surface:#FFF; --card:#FFF;
  --border:#E5E5E3; --border-strong:#CFCFCC;
  --text:#111; --muted:#666; --faint:#999;
  --accent:#D9480F; --on-accent:#FFF;
}
html{scrollbar-color:var(--border-strong) var(--bg)}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
::selection{background:var(--accent);color:var(--on-accent)}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}

/* ── top bar ── */
.bar{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--border)}
.bar-in{max-width:1080px;margin:0 auto;padding:0 20px;height:56px;display:flex;align-items:center;gap:16px}
.brand{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-weight:800;font-size:14px;letter-spacing:.06em;flex-shrink:0}
.brand svg{width:20px;height:20px}
.brand b{color:var(--accent);font-weight:800}
.search{flex:1;max-width:340px;margin-left:auto}
.search input{
  width:100%;height:34px;padding:0 12px;
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  color:var(--text);font-family:var(--mono);font-size:12.5px;outline:none;
}
.search input:focus{border-color:var(--accent)}
.search input::placeholder{color:var(--faint)}
.acct{font-family:var(--mono);font-size:12px;color:var(--muted);white-space:nowrap}
.acct b{color:var(--text);font-weight:500}
.acct:hover b{color:var(--accent)}
.tgl{font-size:14px;color:var(--muted);padding:4px 6px}
.tgl:hover{color:var(--text)}

/* ── layout ── */
.wrap{max-width:1080px;margin:0 auto;padding:28px 20px 60px}
.kick{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
h1{font-family:var(--mono);font-size:clamp(20px,3.4vw,26px);font-weight:700;letter-spacing:-.01em;margin-bottom:4px}
.sub{color:var(--muted);font-size:13.5px;margin-bottom:24px}

/* ── continue strip ── */
.cont{
  display:none;align-items:baseline;gap:10px;flex-wrap:wrap;
  border:1px solid var(--border);border-left:2px solid var(--accent);border-radius:10px;
  padding:12px 16px;margin-bottom:26px;font-family:var(--mono);font-size:12.5px;
}
.cont.on{display:flex}
.cont .lbl{color:var(--accent);font-weight:700;letter-spacing:.1em}
.cont a{font-weight:500;border-bottom:1px solid var(--border-strong)}
.cont a:hover{color:var(--accent);border-color:var(--accent)}
.cont .st{color:var(--muted)}

/* ── filter chips ── */
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}
.chip{
  font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;
  padding:7px 13px;border:1px solid var(--border);border-radius:999px;color:var(--muted);
}
.chip:hover{border-color:var(--border-strong);color:var(--text)}
.chip.on{background:var(--accent);border-color:var(--accent);color:var(--on-accent);font-weight:700}
.chip .n{opacity:.65;margin-left:4px}

/* ── grid ── */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.grid{grid-template-columns:1fr}.bar-in{gap:10px}.search{max-width:none}}
.card{
  display:flex;flex-direction:column;gap:8px;min-width:0;
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:16px 16px 14px;min-height:150px;
}
.card:hover{border-color:var(--border-strong)}
.card:hover .ttl{color:var(--accent)}
.card.paid{border-color:var(--accent)}
.chead{display:flex;justify-content:space-between;align-items:baseline;font-family:var(--mono);font-size:11px}
.num{color:var(--faint)}
.cat{color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.card.paid .cat{color:var(--accent);font-weight:700}
.ttl{font-size:15px;font-weight:600;line-height:1.35}
.desc{
  color:var(--muted);font-size:12.5px;line-height:1.55;flex:1;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.desc:empty{display:none}
.card:has(.desc:empty){min-height:0}
.cfoot{display:flex;justify-content:space-between;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--faint);border-top:1px solid var(--border);padding-top:10px;min-width:0}
.diff{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chead{min-width:0}
.chead .cat{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.done{color:#22C55E;font-weight:700;white-space:nowrap}
.empty{color:var(--muted);font-family:var(--mono);font-size:13px;padding:40px 0;text-align:center;display:none}

/* ── footer ── */
footer{border-top:1px solid var(--border);margin-top:22px}
.foot{max-width:1080px;margin:0 auto;padding:22px 20px;display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;font-family:var(--mono);font-size:11.5px;color:var(--faint)}
.foot a{color:var(--muted);border-bottom:1px dotted var(--border-strong)}
.foot a:hover{color:var(--accent);border-color:var(--accent)}
@media(prefers-reduced-motion:no-preference){
  .card,.chip,.ttl{transition:border-color .15s ease,color .15s ease,background .15s ease}
}
</style>
</head>
<body>

<nav class="bar" aria-label="Site">
  <div class="bar-in">
    <a class="brand" href="https://flarestamina.com/" aria-label="FLARESTAMINA home">
      <svg viewBox="0 0 24 24" fill="none" stroke="#FF5A1F" stroke-width="2.6" stroke-linecap="round" aria-hidden="true">
        <path d="M12 9.5V1.5"/><path d="M14.5 12h7"/><path d="M12 14.5V19"/><path d="M9.5 12H4"/>
      </svg>
      <span><b>FLARE</b>STAMINA</span>
    </a>
    <div class="search"><input id="q" type="search" placeholder="search tests…" aria-label="Search tests"></div>
    <a class="acct" id="acct" href="https://flarestamina.com/account/">account</a>
    <button class="tgl" id="tgl" aria-label="Toggle theme">◐</button>
  </div>
</nav>

<main class="wrap">
  <div class="kick">Practice Hub</div>
  <h1 id="count">— tests</h1>
  <p class="sub">Free IELTS practice with instant scoring. One account — every result saved.</p>

  <div class="cont" id="cont" aria-label="Continue where you left off">
    <span class="lbl">▸ CONTINUE</span>
    <a id="contLink" href="#"></a>
    <span class="st" id="contStat"></span>
  </div>

  <div class="chips" id="chips" role="tablist" aria-label="Categories"></div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty">no tests match — clear the search or pick another category</div>
</main>

<footer>
  <div class="foot">
    <span>© <span id="yy"></span> FLARESTAMINA</span>
    <span>
      <a href="https://flarestamina.com/">home</a> ·
      <a href="https://flarestamina.com/ielts-hub/results.html">my results</a> ·
      <a href="https://t.me/mrbmp13" target="_blank" rel="noopener">telegram</a>
    </span>
  </div>
</footer>

<script src="https://flarestamina.com/assets/fs-auth.js"></script>
<script>
(function () {
  'use strict';
  document.getElementById('yy').textContent = new Date().getFullYear();

  /* auth — mandatory, one redirect; page keeps working if the script failed */
  var user = null;
  if (window.FSAuth) {
    if (!FSAuth.require()) return;
    user = FSAuth.getUser();
    if (user && user.first_name) {
      document.getElementById('acct').innerHTML = 'hi, <b></b>';
      document.getElementById('acct').querySelector('b').textContent = user.first_name;
    }
  }

  /* theme */
  document.getElementById('tgl').addEventListener('click', function () {
    var next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
    document.documentElement.dataset.theme = next;
    try { localStorage.setItem('theme', next); } catch (e) {}
  });

  /* results history -> done badges + continue strip */
  var hist = [];
  try { hist = JSON.parse(localStorage.getItem('p8_results') || '[]'); } catch (e) {}
  var doneByHref = {};
  hist.forEach(function (h) {
    if (h && h.href) doneByHref[h.href.replace(/[#?].*$/, '').replace(/\/$/, '')] = h.score;
  });
  function doneScore(url) {
    var u = url.replace(/[#?].*$/, '').replace(/\/$/, '');
    for (var k in doneByHref) {
      if (k.indexOf(u) === 0 || u.indexOf(k) === 0) return doneByHref[k];
    }
    return null;
  }

  if (hist.length) {
    var last = hist[hist.length - 1];
    var weekAgo = Date.now() - 7 * 864e5;
    var week = hist.filter(function (h) { return h.date && Date.parse(h.date) > weekAgo; }).length;
    var c = document.getElementById('cont');
    var a = document.getElementById('contLink');
    a.textContent = last.test || 'your last test';
    a.href = last.href || '#';
    document.getElementById('contStat').textContent =
      '· last score ' + (last.score || '—') + ' · ' + week + ' test' + (week === 1 ? '' : 's') + ' this week';
    c.classList.add('on');
  }

  /* catalog */
  var CATS = [], TESTS = [], cat = 'All', q = '';
  try { cat = new URLSearchParams(location.search).get('cat') || 'All'; } catch (e) {}

  function chips() {
    var counts = { All: TESTS.length };
    TESTS.forEach(function (t) { counts[t.category] = (counts[t.category] || 0) + 1; });
    var el = document.getElementById('chips');
    el.innerHTML = '';
    ['All'].concat(CATS).forEach(function (c) {
      if (c !== 'All' && !counts[c]) return;
      var b = document.createElement('button');
      b.className = 'chip' + (c === cat ? ' on' : '');
      b.setAttribute('role', 'tab');
      b.innerHTML = '<span></span><span class="n"></span>';
      b.firstChild.textContent = c;
      b.lastChild.textContent = counts[c] || 0;
      b.addEventListener('click', function () {
        cat = c;
        try { history.replaceState(null, '', c === 'All' ? location.pathname : '?cat=' + encodeURIComponent(c)); } catch (e) {}
        chips(); render();
      });
      el.appendChild(b);
    });
  }

  function render() {
    var grid = document.getElementById('grid');
    grid.innerHTML = '';
    var ql = q.trim().toLowerCase();
    var shown = 0;
    TESTS.forEach(function (t, i) {
      if (cat !== 'All' && t.category !== cat) return;
      if (ql && (t.title + ' ' + (t.description || '')).toLowerCase().indexOf(ql) === -1) return;
      shown++;
      var a = document.createElement('a');
      a.className = 'card' + (t.category === 'Full Mock' ? ' paid' : '');
      a.href = t.url;
      var score = doneScore(t.url);
      a.innerHTML =
        '<div class="chead"><span class="num"></span><span class="cat"></span></div>' +
        '<div class="ttl"></div><div class="desc"></div>' +
        '<div class="cfoot"><span class="diff"></span>' + (score != null ? '<span class="done">✓ ' + String(score).replace(/</g, '&lt;') + '</span>' : '') + '</div>';
      a.querySelector('.num').textContent = '// ' + String(i + 1).padStart(3, '0');
      a.querySelector('.cat').textContent = t.category;
      a.querySelector('.ttl').textContent = t.title;
      a.querySelector('.desc').textContent = t.description || '';
      a.querySelector('.diff').textContent = t.difficulty || '';
      grid.appendChild(a);
    });
    document.getElementById('count').textContent = shown + (shown === TESTS.length ? ' tests' : ' of ' + TESTS.length + ' tests');
    document.getElementById('empty').style.display = shown ? 'none' : 'block';
  }

  var deb = null;
  document.getElementById('q').addEventListener('input', function (e) {
    clearTimeout(deb);
    deb = setTimeout(function () { q = e.target.value; render(); }, 120);
  });

  fetch('tests.json', { cache: 'no-cache' })
    .then(function (r) { return r.json(); })
    .then(function (d) {
      CATS = d.categories || [];
      TESTS = d.tests || [];
      if (CATS.indexOf(cat) === -1 && cat !== 'All') cat = 'All';
      chips(); render();
    })
    .catch(function () {
      document.getElementById('count').textContent = 'could not load tests';
      document.getElementById('empty').style.display = 'block';
    });
})();
</script>
</body>
</html>
