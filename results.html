<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Results — FLARESTAMINA</title>
<meta name="description" content="Your IELTS practice history: streak, weekly activity and every saved score — on any device with one FS Account.">
<meta name="robots" content="noindex">
<meta name="theme-color" content="#000000">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<script>
(function () {
  try {
    var t = localStorage.getItem('theme') || 'dark';
    document.documentElement.dataset.theme = t;
  } catch (e) { document.documentElement.dataset.theme = 'dark'; }
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@400;500;600&display=swap">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000; --surface:#0A0A0A; --card:#0D0D0D;
  --border:#232323; --border-strong:#3a3a3a;
  --text:#EDEDED; --muted:#8A8A8A; --faint:#555;
  --accent:#FF5A1F; --on-accent:#180702; --ok:#22C55E;
  --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  --sans:'Inter',system-ui,-apple-system,sans-serif;
}
html[data-theme="light"]{
  --bg:#FAFAF9; --surface:#FFF; --card:#FFF;
  --border:#E5E5E3; --border-strong:#CFCFCC;
  --text:#111; --muted:#666; --faint:#999;
  --accent:#D9480F; --on-accent:#FFF; --ok:#15803D;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
::selection{background:var(--accent);color:var(--on-accent)}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}

.bar{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--border)}
.bar-in{max-width:980px;margin:0 auto;padding:0 24px;height:56px;display:flex;align-items:center;gap:16px}
.brand{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-weight:800;font-size:14px;letter-spacing:.06em}
.brand svg{width:20px;height:20px}
.brand b{color:var(--accent)}
.acct{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--muted);white-space:nowrap}
.acct b{color:var(--text);font-weight:500}
.tgl{font-size:14px;color:var(--muted);padding:4px 6px}
.tgl:hover{color:var(--text)}

.wrap{max-width:980px;margin:0 auto;padding:28px 24px 60px}
.kick{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
h1{font-family:var(--mono);font-size:clamp(20px,3.4vw,26px);font-weight:700;margin-bottom:4px}
.sub{color:var(--muted);font-size:13px;margin-bottom:26px;font-family:var(--mono)}
.sub .ok{color:var(--ok)}

.tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:26px}
@media(max-width:640px){.tiles{grid-template-columns:repeat(2,1fr)}}
.tile{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
.tile .lb{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-bottom:6px}
.tile .v{font-family:var(--mono);font-size:24px;font-weight:800}
.tile .v small{font-size:12px;color:var(--muted);font-weight:500}
.tile.hot .v{color:var(--accent)}

.sec{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin:26px 0 12px}
.chart{display:flex;align-items:flex-end;gap:3px;height:74px;border:1px solid var(--border);border-radius:12px;padding:12px 14px 10px;background:var(--card)}
.chart i{flex:1;background:var(--border-strong);border-radius:2px 2px 0 0;min-height:3px}
.chart i.on{background:var(--accent)}
.chart-lbl{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--faint);margin-top:6px}

.hist{border:1px solid var(--border);border-radius:12px;overflow:hidden}
.row{display:flex;align-items:baseline;gap:14px;padding:11px 16px;border-bottom:1px solid var(--border);font-size:13.5px}
.row:last-child{border-bottom:none}
.row .d{font-family:var(--mono);font-size:11px;color:var(--faint);min-width:86px}
.row .t{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .s{font-family:var(--mono);font-weight:700;color:var(--ok);white-space:nowrap}
.row .cloud{font-size:10px;color:var(--faint)}
.none{padding:30px 16px;color:var(--muted);font-family:var(--mono);font-size:13px;text-align:center}

footer{border-top:1px solid var(--border);margin-top:34px}
.foot{max-width:980px;margin:0 auto;padding:22px 24px;display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;font-family:var(--mono);font-size:11.5px;color:var(--faint)}
.foot a{color:var(--muted);border-bottom:1px dotted var(--border-strong)}
.foot a:hover{color:var(--accent);border-color:var(--accent)}
</style>
</head>
<body>

<nav class="bar" aria-label="Site">
  <div class="bar-in">
    <a class="brand" href="https://flarestamina.com/ielts-hub/" aria-label="Back to the hub">
      <svg viewBox="0 0 24 24" fill="none" stroke="#FF5A1F" stroke-width="2.6" stroke-linecap="round" aria-hidden="true">
        <path d="M12 9.5V1.5"/><path d="M14.5 12h7"/><path d="M12 14.5V19"/><path d="M9.5 12H4"/>
      </svg>
      <span><b>FLARE</b>STAMINA</span>
    </a>
    <a class="acct" id="acct" href="https://flarestamina.com/account/">account</a>
    <button class="tgl" id="tgl" aria-label="Toggle theme">◐</button>
  </div>
</nav>

<main class="wrap">
  <div class="kick">My Results</div>
  <h1 id="head">—</h1>
  <p class="sub" id="syncline">loading…</p>

  <div class="tiles">
    <div class="tile"><div class="lb">Total tests</div><div class="v" id="vTotal">—</div></div>
    <div class="tile"><div class="lb">This week</div><div class="v" id="vWeek">—</div></div>
    <div class="tile hot"><div class="lb">Streak</div><div class="v" id="vStreak">—<small> days</small></div></div>
    <div class="tile"><div class="lb">Best (of 40)</div><div class="v" id="vBest">—</div></div>
  </div>

  <div class="sec">Last 30 days</div>
  <div class="chart" id="chart" aria-label="Practice activity, last 30 days"></div>
  <div class="chart-lbl"><span id="d30"></span><span>today</span></div>

  <div class="sec">History</div>
  <div class="hist" id="hist"><div class="none">loading…</div></div>
</main>

<footer>
  <div class="foot">
    <span>© <span id="yy"></span> FLARESTAMINA</span>
    <span><a href="https://flarestamina.com/ielts-hub/">← back to tests</a> · <a href="https://t.me/flarestamina" target="_blank" rel="noopener">telegram @flarestamina</a></span>
  </div>
</footer>

<script src="https://flarestamina.com/assets/fs-auth.js"></script>
<script>
(function () {
  'use strict';
  document.getElementById('yy').textContent = new Date().getFullYear();
  document.getElementById('tgl').addEventListener('click', function () {
    var next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
    document.documentElement.dataset.theme = next;
    try { localStorage.setItem('theme', next); } catch (e) {}
  });

  var user = null;
  if (window.FSAuth) {
    if (!FSAuth.require()) return;
    user = FSAuth.getUser();
    if (user && user.first_name) {
      var acct = document.getElementById('acct');
      acct.innerHTML = 'hi, <b></b>';
      acct.querySelector('b').textContent = user.first_name;
    }
  }
  document.getElementById('head').textContent = user ? (user.first_name + "'s progress") : 'Your progress';

  /* ── data: local history + cloud results (keyed by phone) ── */
  var FS_PROJECT = 'ieltshub-e2aa8';

  function localResults() {
    try {
      return (JSON.parse(localStorage.getItem('p8_results') || '[]')).map(function (h) {
        return { test: h.test || '', score: h.score, href: h.href || '', date: h.date, cloud: false };
      });
    } catch (e) { return []; }
  }

  function cloudResults(phone) {
    if (!phone) return Promise.resolve([]);
    return fetch('https://firestore.googleapis.com/v1/projects/' + FS_PROJECT + '/databases/(default)/documents:runQuery', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        structuredQuery: {
          from: [{ collectionId: 'results' }],
          where: { fieldFilter: { field: { fieldPath: 'phone' }, op: 'EQUAL', value: { stringValue: phone } } },
          limit: 500
        }
      })
    }).then(function (r) { return r.json(); }).then(function (rows) {
      return (rows || []).filter(function (r) { return r.document; }).map(function (r) {
        var f = r.document.fields || {};
        return {
          test: (f.test && f.test.stringValue) || '',
          score: f.score ? (f.score.integerValue != null ? f.score.integerValue : f.score.doubleValue) : '',
          href: '',
          date: (f.ts && f.ts.timestampValue) || r.document.createTime,
          cloud: true
        };
      });
    }).catch(function () { return null; }); // null = cloud unreachable
  }

  function key(r) {
    return r.test + '|' + r.score + '|' + String(r.date || '').slice(0, 16);
  }

  function render(items, cloudState) {
    items = items.filter(function (r) { return r.date; });
    items.sort(function (a, b) { return new Date(a.date) - new Date(b.date); });

    var now = new Date();
    var weekAgo = now.getTime() - 7 * 864e5;

    // tiles
    document.getElementById('vTotal').textContent = items.length;
    document.getElementById('vWeek').textContent = items.filter(function (r) { return new Date(r.date) > weekAgo; }).length;

    var days = {};
    items.forEach(function (r) {
      var d = new Date(r.date);
      var k = d.getFullYear() + '-' + (d.getMonth() + 1) + '-' + d.getDate();
      days[k] = (days[k] || 0) + 1;
    });
    function dayKey(offset) {
      var d = new Date(now.getTime() - offset * 864e5);
      return d.getFullYear() + '-' + (d.getMonth() + 1) + '-' + d.getDate();
    }
    var streak = 0, start = days[dayKey(0)] ? 0 : 1;
    for (var i = start; days[dayKey(i)]; i++) streak++;
    var streakEl = document.getElementById('vStreak');
    streakEl.innerHTML = '';
    streakEl.append(String(streak));
    var sm = document.createElement('small'); sm.textContent = ' days'; streakEl.appendChild(sm);

    var best = null;
    items.forEach(function (r) {
      var m = String(r.score).match(/^(\d+)\s*(?:\/\s*40)?$/);
      if (m) { var n = +m[1]; if (n <= 40 && (best === null || n > best)) best = n; }
    });
    document.getElementById('vBest').textContent = best === null ? '—' : best;

    // 30-day chart
    var chart = document.getElementById('chart');
    chart.innerHTML = '';
    var max = 1;
    var counts = [];
    for (var d = 29; d >= 0; d--) { var c = days[dayKey(d)] || 0; counts.push(c); if (c > max) max = c; }
    counts.forEach(function (c) {
      var b = document.createElement('i');
      if (c) { b.className = 'on'; b.style.height = Math.max(12, Math.round(c / max * 100)) + '%'; }
      chart.appendChild(b);
    });
    var d30 = new Date(now.getTime() - 29 * 864e5);
    document.getElementById('d30').textContent = d30.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });

    // history (latest 60)
    var hist = document.getElementById('hist');
    hist.innerHTML = '';
    if (!items.length) {
      hist.innerHTML = '<div class="none">no results yet — finish any test and it appears here</div>';
    } else {
      items.slice(-60).reverse().forEach(function (r) {
        var row = document.createElement(r.href ? 'a' : 'div');
        row.className = 'row';
        if (r.href) row.href = r.href;
        var d = new Date(r.date);
        row.innerHTML = '<span class="d"></span><span class="t"></span>' + (r.cloud ? '<span class="cloud">☁</span>' : '') + '<span class="s"></span>';
        row.querySelector('.d').textContent = d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
        row.querySelector('.t').textContent = r.test || 'Test';
        row.querySelector('.s').textContent = r.score !== '' && r.score != null ? '✓ ' + r.score : '';
        hist.appendChild(row);
      });
    }

    // sync line
    var syncline = document.getElementById('syncline');
    if (cloudState === null) {
      syncline.textContent = 'showing this device only — cloud not reachable';
    } else {
      syncline.innerHTML = '<span class="ok">✓ synced to your FS Account</span> — same history on every device (' + cloudState + ' cloud records)';
    }
  }

  var local = localResults();
  render(local, 0); // instant paint from local
  cloudResults(user ? user.phone : '').then(function (cloud) {
    if (cloud === null) { render(local, null); return; }
    var seen = {}, merged = [];
    local.concat(cloud).forEach(function (r) {
      var k = key(r);
      if (seen[k]) return;
      seen[k] = 1;
      merged.push(r);
    });
    render(merged, cloud.length);
  });
})();
</script>
<script data-goatcounter="https://flarestamina.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
